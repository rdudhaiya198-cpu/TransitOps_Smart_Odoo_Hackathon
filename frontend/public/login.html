<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#141414">
    <title>TransitOps | Secure Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/auth.css" rel="stylesheet">
</head>

<body class="auth-guest-shell">
    <main class="auth-page d-flex align-items-center justify-content-center min-vh-100">
        <div class="auth-page-bg" aria-hidden="true"></div>

        <div class="container auth-page-container py-4 py-md-5">
            <div class="auth-panel mx-auto">
                <div class="auth-brand text-center mb-4 mb-md-5">
                    <div class="auth-brand-icon mb-3">
                        <i class="bi bi-truck"></i>
                    </div>
                    <h1 class="auth-brand-title mb-2">TransitOps</h1>
                    <div class="auth-brand-subtitle">Fleet Management Command Center</div>
                </div>

                <div class="card auth-card shadow-lg border-0">
                    <div class="card-body auth-card-body">
                        <div class="text-center mb-4">
                            <h2 class="auth-card-title mb-2">Secure Login</h2>
                            <p class="auth-card-description mb-0">Enter your credentials to access the fleet dashboard.</p>
                        </div>

                        <!-- Alert Box for Errors -->
                        <div id="login-error-alert" class="alert alert-danger alert-dismissible fade show auth-alert d-none" role="alert">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            <span id="login-error-message">Please verify your credentials and try again.</span>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <form id="login-form" class="auth-form" novalidate>
                            <!-- Access Role Select -->
                            <div class="auth-field mb-3">
                                <div class="form-floating auth-floating-field">
                                    <span class="auth-input-icon"><i class="bi bi-person-badge"></i></span>
                                    <select id="role" name="role" class="form-select auth-control auth-control-select" aria-label="Access Role" required>
                                        <option value="" selected disabled>Select access role</option>
                                        <option value="Fleet Manager">Fleet Manager</option>
                                        <option value="Driver">Driver</option>
                                        <option value="Safety Officer">Safety Officer</option>
                                        <option value="Financial Analyst">Financial Analyst</option>
                                    </select>
                                    <label for="role">Access Role</label>
                                </div>
                            </div>

                            <!-- Email Input -->
                            <div class="auth-field mb-3">
                                <div class="form-floating auth-floating-field">
                                    <span class="auth-input-icon"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" name="email" class="form-control auth-control" placeholder="name@transitops.com" autocomplete="email" aria-label="Work Email" required>
                                    <label for="email">Work Email</label>
                                </div>
                            </div>

                            <!-- Password Input -->
                            <div class="auth-field mb-3">
                                <div class="form-floating auth-floating-field auth-floating-field-password">
                                    <span class="auth-input-icon"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="password" name="password" class="form-control auth-control auth-password-input" placeholder="Password" autocomplete="current-password" aria-label="Password" required>
                                    <label for="password">Password</label>
                                    <button type="button" class="btn auth-password-toggle" data-auth-password-toggle data-target="#password" aria-label="Toggle password visibility">
                                        <i class="bi bi-eye" data-auth-password-icon></i>
                                    </button>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center gap-3 mb-4">
                                <div class="form-check auth-remember-check mb-0">
                                    <input class="form-check-input" type="checkbox" value="1" id="remember_device" name="remember_device">
                                    <label class="form-check-label" for="remember_device">Remember this device for 30 days</label>
                                </div>

                                <a href="#" class="auth-forgot-link small text-decoration-none">Forgot password?</a>
                            </div>

                            <button type="submit" class="btn auth-submit-btn w-100 d-inline-flex align-items-center justify-content-center gap-2">
                                <span id="submit-text">Establish Connection</span>
                                <i class="bi bi-arrow-right"></i>
                            </button>
                        </form>

                        <div class="auth-divider my-4"></div>

                        <div class="auth-system-status d-flex align-items-center justify-content-between gap-3">
                            <div class="d-flex align-items-center gap-2">
                                <span class="auth-status-dot"></span>
                                <span>Systems Operational</span>
                            </div>
                            <div class="auth-status-links text-end">
                                <a href="#">Privacy</a>
                                <a href="#">Legal</a>
                            </div>
                        </div>

                        <div class="auth-footer text-center mt-4 pt-2">
                            <div>Secure Encrypted Terminal Access</div>
                            <div>TransitOps v4.2</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="js/auth.js"></script>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            
            const role = document.getElementById('role').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('login-error-alert');
            const alertMsg = document.getElementById('login-error-message');
            const submitBtn = document.querySelector('.auth-submit-btn');
            const submitText = document.getElementById('submit-text');

            if (!role || !email || !password) {
                alertMsg.innerText = "Please fill in all fields.";
                alertBox.classList.remove('d-none');
                return;
            }

            try {
                alertBox.classList.add('d-none');
                submitText.innerText = "Connecting...";
                submitBtn.disabled = true;

                // Call FastAPI login
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: 'Authentication failed.' }));
                    // If login failed, let's try to register the user for easier hackathon testing!
                    if (response.status === 400 && (errorData.detail.includes("Invalid credentials") || errorData.detail.includes("not found") || errorData.detail.includes("User not found"))) {
                        // Attempt auto-registration in development mode!
                        const regResponse = await fetch('/auth/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ email, password, role })
                        });

                        if (regResponse.ok) {
                            // If auto-register is successful, re-try login
                            const loginRetry = await fetch('/auth/login', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify({ email, password })
                            });
                            if (loginRetry.ok) {
                                const data = await loginRetry.json();
                                localStorage.setItem('access_token', data.access_token);
                                // Save profile role explicitly
                                data.user.role = role;
                                localStorage.setItem('user', JSON.stringify(data.user));
                                window.location.href = 'dashboard.html';
                                return;
                            }
                        }
                    }
                    throw new Error(errorData.detail || 'Access denied. Please check credentials.');
                }

                const data = await response.json();
                localStorage.setItem('access_token', data.access_token);
                // In actual deployment user role comes from profile. For mockup, we can use the selected role.
                data.user.role = role;
                localStorage.setItem('user', JSON.stringify(data.user));
                
                window.location.href = 'dashboard.html';
            } catch (err) {
                alertMsg.innerText = err.message;
                alertBox.classList.remove('d-none');
                submitText.innerText = "Establish Connection";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
